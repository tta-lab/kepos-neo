<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>{{PUBLISHER_NAME}} · Kepos</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="min-h-screen bg-base-100 text-base-content antialiased">
    <header class="navbar border-b border-base-300 px-4 sm:px-8">
      <div class="mx-auto flex w-full max-w-3xl items-center justify-between py-3">
        <div class="flex items-center gap-3">
          <span class="grid size-9 place-items-center border border-base-300 font-mono text-sm font-bold" aria-hidden="true">K</span>
          <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-base-content/60">Kepos Home</p>
            <p class="font-semibold">{{PUBLISHER_NAME}}</p>
          </div>
        </div>
        <div class="flex items-center gap-2 text-sm" aria-label="Publisher online">
          <span class="status status-success" aria-hidden="true"></span>
          <span>Online</span>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-3xl px-4 py-12 sm:px-8 sm:py-20">
      <section aria-labelledby="home-heading" class="space-y-5">
        <p class="font-mono text-xs font-semibold uppercase tracking-[0.18em] text-base-content/60">One trusted endpoint</p>
        <h1 id="home-heading" class="max-w-2xl text-4xl font-bold leading-tight tracking-tight sm:text-6xl">Your way into this Home.</h1>
        <p class="max-w-xl text-base leading-7 text-base-content/70 sm:text-lg">
          This publisher shares local services with allowed Kepos clients. The directory below is the full list available here.
        </p>
      </section>

      <section aria-labelledby="services-heading" class="mt-12 border-t border-base-300 pt-6 sm:mt-16">
        <div class="flex items-baseline justify-between gap-4">
          <h2 id="services-heading" class="text-sm font-bold uppercase tracking-wider">Services</h2>
          <span class="font-mono text-xs text-base-content/50">{{SERVICE_COUNT}}</span>
        </div>
        <ul class="list mt-3 border-y border-base-300">
          {{SERVICE_ROWS}}
        </ul>
      </section>

      <footer class="mt-8 text-sm text-base-content/60">
        <a class="link link-hover underline-offset-4" href="/.well-known/kepos/services.json">Open Registry JSON</a>
      </footer>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
